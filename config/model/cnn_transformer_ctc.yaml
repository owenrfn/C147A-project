# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNTransformerCTCModule
  in_features: 528      # freq * channels = 33 * 16 = 528
  mlp_features: [256]   # Leads to 512 num_features going into the CNN
  
  # Local CNN parameters
  block_channels: [32, 32]
  kernel_width: 32
  
  # global transformer parameters
  d_model: 256          
  nhead: 8              
  num_layers: 4         
  dim_feedforward: 1024 
  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [900, 100]   # 1000 total padding samples offsets the 62 frame CNN shrinkage perfectly without sequence edge loss
