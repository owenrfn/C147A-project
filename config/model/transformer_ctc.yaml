# @package _global_
module:
  _target_: emg2qwerty.lightning.TransformerCTCModule
  in_features: 528      # freq * channels = 33 * 16 = 528
  mlp_features: [256]   # Feeds 512 dimensions into linear projection
  d_model: 256          # Transformer hidden dimension
  nhead: 8
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.15

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [0, 0]       # Transformers look at global context, no shrinking edge padding needed
