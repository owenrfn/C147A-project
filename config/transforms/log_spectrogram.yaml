# @package _global_
to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

normalize_per_channel:
  _target_: emg2qwerty.transforms.NormalizePerChannel

gaussian_noise:
  _target_: emg2qwerty.transforms.GaussianNoise
  std: 0.02
  prob: 0.5

band_rotation:
  _target_: emg2qwerty.transforms.ForEach  # i.i.d rotation offset for each band
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120  # Max 60ms jitter for 2kHz EMG

channel_dropout:
  _target_: emg2qwerty.transforms.ForEach  # i.i.d channel masks for each band
  transform:
    _target_: emg2qwerty.transforms.ChannelDropout
    dropout_prob: 0.06

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16  # Downsamples from 2kHz to 125Hz

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25  # Max 200ms per time mask for 125Hz spectrogram
  n_freq_masks: 2
  freq_mask_param: 4

transforms:
  train:
    - ${to_tensor}
    - ${normalize_per_channel}
    - ${gaussian_noise}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${channel_dropout}
    - ${logspec}
    - ${specaug}

  val:
    - ${to_tensor}
    # - ${normalize_per_channel}
    - ${logspec}

  test: ${transforms.val}
