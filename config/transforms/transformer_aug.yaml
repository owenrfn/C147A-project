# @package _global_
to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

per_channel_norm:
  _target_: emg2qwerty.transforms.NormalizePerChannel
  eps: 1e-6

gaussian_noise:
  _target_: emg2qwerty.transforms.GaussianNoise
  std: 0.02
  relative: false
  prob: 1.0

channel_dropout:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.ChannelDropout
    dropout_prob: 0.06

band_rotation:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25
  n_freq_masks: 2
  freq_mask_param: 4

transforms:
  train:
    - ${to_tensor}
    - ${per_channel_norm}
    - ${gaussian_noise}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${channel_dropout}
    - ${logspec}
    - ${specaug}

  val:
    - ${to_tensor}
    - ${per_channel_norm}     # Keep normalization
    - ${gaussian_noise}
    - ${logspec}

  test: ${transforms.val}
